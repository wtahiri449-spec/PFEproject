<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — ESTBM Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --blue: #1d4ed8; --blue-light: #3b82f6; --blue-glow: rgba(59,130,246,0.25);
      --green: #059669; --green-light: #10b981;
      --bg: #050d1a; --surface: #0d1f35; --border: rgba(59,130,246,0.2);
      --text: #e2e8f0; --muted: #64748b; --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 350px; height: 350px; background: rgba(29,78,216,0.12); top: -80px; right: -80px; }
    .orb-2 { width: 250px; height: 250px; background: rgba(5,150,105,0.1); bottom: -60px; left: -60px; animation-delay: 4s; }
    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(15px, -15px); }
    }
    .wrapper {
      position: relative; z-index: 10;
      width: 500px; max-width: 95vw;
      animation: slideUp 0.6s cubic-bezier(0.23,1,0.32,1) both;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform:translateY(0); } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    }

    .card-header {
      background: linear-gradient(135deg, #0a1628, #112240);
      padding: 32px 36px 28px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 8px; }
    .card-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .card-header p { color: var(--muted); font-size: 0.88rem; }

    .card-body { padding: 32px 36px; }

    /* Tabs */
    .role-tabs {
      display: flex;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 4px;
      margin-bottom: 28px; gap: 4px;
    }
    .role-btn {
      flex: 1; padding: 11px;
      border: none; border-radius: 10px;
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .role-btn.active { background: var(--blue); color: var(--white); box-shadow: 0 0 16px var(--blue-glow); }
    .role-btn.active.green { background: var(--green); box-shadow: 0 0 16px rgba(5,150,105,0.3); }

    /* Form */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.78rem; font-weight: 600;
      color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }
    .field input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      outline: none; transition: all 0.2s;
    }
    .field input::placeholder { color: #334155; }
    .field input:focus {
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px var(--blue-glow);
      background: rgba(29,78,216,0.05);
    }

    .row-options {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; font-size: 0.8rem;
    }
    .check-label { display: flex; align-items: center; gap: 8px; color: var(--muted); cursor: pointer; }
    .check-label input[type=checkbox] { accent-color: var(--blue-light); }
    .forgot { color: var(--blue-light); text-decoration: none; font-weight: 500; }
    .forgot:hover { color: var(--white); }

    .btn-submit {
      width: 100%; padding: 14px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s; margin-top: 8px;
      letter-spacing: 0.03em;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--blue-glow); }
    .btn-submit.green { background: linear-gradient(135deg, var(--green), var(--green-light)); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0;
      color: var(--muted); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--border);
    }

    .signup-link {
      text-align: center; margin-top: 22px;
      font-size: 0.85rem; color: var(--muted);
    }
    .signup-link a { color: var(--blue-light); font-weight: 600; text-decoration: none; }
    .signup-link a:hover { color: var(--white); }

    .alert { padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .alert-success { background: rgba(5,150,105,0.15); border: 1px solid rgba(5,150,105,0.3); color: var(--green-light); }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">
  <div class="card">
    <div class="card-header">
      <div class="logo"></div>
      <h2>Connexion</h2>
      <p>Accédez à votre espace personnel</p>
    </div>

    <div class="card-body">
      <div id="alertBox" class="alert"></div>

      <div class="role-tabs">
        <button class="role-btn active" id="btnEtudiant" onclick="setRole('etudiant')">
          <i class="fas fa-user-graduate"></i> Étudiant
        </button>
        <button class="role-btn" id="btnProf" onclick="setRole('enseignant')">
          <i class="fas fa-user-tie"></i> Enseignant
        </button>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Numéro Apogée / Identifiant</label>
          <div class="input-wrap">
            <i class="fas fa-id-card input-icon"></i>
            <input type="text" id="apogee" placeholder="Ex: 2200001 ou PROF001" required>
          </div>
        </div>

        <div class="field">
          <label>Mot de passe</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
        </div>

        <div class="row-options">
          <label class="check-label">
            <input type="checkbox" id="remember"> Se souvenir de moi
          </label>
          <a href="#" class="forgot">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-submit" id="btnLogin">
          <i class="fas fa-arrow-right-to-bracket"></i> Se connecter
        </button>
      </form>

      <div class="divider">ou</div>

      <div class="signup-link">
        Pas encore de compte ? <a href="inscription.html">Créer un compte</a>
      </div>
    </div>
  </div>
</div>

<script>
  let currentRole = 'etudiant';

  function setRole(role) {
    currentRole = role;
    const btnE = document.getElementById('btnEtudiant');
    const btnP = document.getElementById('btnProf');
    const btnLogin = document.getElementById('btnLogin');

    if (role === 'etudiant') {
      btnE.className = 'role-btn active';
      btnP.className = 'role-btn';
      btnLogin.className = 'btn-submit';
    } else {
      btnE.className = 'role-btn';
      btnP.className = 'role-btn active green';
      btnLogin.className = 'btn-submit green';
    }
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.innerHTML = msg;
    box.style.display = 'block';
    if (type === 'success') setTimeout(() => box.style.display = 'none', 4000);
  }

  async function handleLogin(e) {
    e.preventDefault();
    const apogee = document.getElementById('apogee').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification...';

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apogee, password })
      });
      const data = await res.json();

      if (res.ok && data.access_token) {
        // Use the typed apogee (not from response, in case it's missing)
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('userName', data.full_name);
        localStorage.setItem('apogee', apogee);               // <-- from input, safe
        localStorage.setItem('email', data.email);
        localStorage.setItem('isProf', data.is_prof ? '1' : '0');
        localStorage.setItem('avatar', data.avatar || '');
        showAlert('Connexion réussie ! Redirection...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1200);
      } else {
        showAlert(' ' + (data.detail || 'Identifiants invalides'), 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Se connecter';
      }
    } catch (err) {
      showAlert(' Erreur réseau. Vérifiez que le serveur est lancé.', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Se connecter';
    }
  }
</script>
</body>
</html>
