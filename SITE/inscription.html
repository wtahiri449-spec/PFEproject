<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — AcadémIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --blue: #1d4ed8; --blue-light: #3b82f6; --blue-glow: rgba(59,130,246,0.25);
      --green: #059669; --green-light: #10b981;
      --bg: #050d1a; --surface: #0d1f35; --border: rgba(59,130,246,0.2);
      --text: #e2e8f0; --muted: #64748b; --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 350px; height: 350px; background: rgba(29,78,216,0.12); top: -80px; right: -80px; }
    .orb-2 { width: 250px; height: 250px; background: rgba(5,150,105,0.1); bottom: -60px; left: -60px; animation-delay: 4s; }
    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(15px, -15px); }
    }
    .wrapper {
      position: relative; z-index: 10;
      width: 500px; max-width: 95vw;
      animation: slideUp 0.6s cubic-bezier(0.23,1,0.32,1) both;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform:translateY(0); } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    }

    .card-header {
      background: linear-gradient(135deg, #0a1628, #112240);
      padding: 32px 36px 28px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 8px; }
    .card-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .card-header p { color: var(--muted); font-size: 0.88rem; }

    .card-body { padding: 32px 36px; }

    /* Tabs */
    .role-tabs {
      display: flex;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 4px;
      margin-bottom: 28px; gap: 4px;
    }
    .role-btn {
      flex: 1; padding: 11px;
      border: none; border-radius: 10px;
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .role-btn.active { background: var(--blue); color: var(--white); box-shadow: 0 0 16px var(--blue-glow); }
    .role-btn.active.green { background: var(--green); box-shadow: 0 0 16px rgba(5,150,105,0.3); }

    /* Formulaire */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.78rem; font-weight: 600;
      color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }
    .field input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      outline: none; transition: all 0.2s;
    }
    .field input::placeholder { color: #334155; }
    .field input:focus {
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px var(--blue-glow);
      background: rgba(29,78,216,0.05);
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-submit {
      width: 100%; padding: 14px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s; margin-top: 8px;
      letter-spacing: 0.03em;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--blue-glow); }
    .btn-submit.green { background: linear-gradient(135deg, var(--green), var(--green-light)); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .login-link {
      text-align: center; margin-top: 22px;
      font-size: 0.85rem; color: var(--muted);
    }
    .login-link a { color: var(--blue-light); font-weight: 600; text-decoration: none; }

    .alert { padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .alert-success { background: rgba(5,150,105,0.15); border: 1px solid rgba(5,150,105,0.3); color: var(--green-light); }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }

    .password-strength { height: 4px; border-radius: 2px; margin-top: 6px; background: #1e293b; overflow: hidden; }
    .strength-bar { height: 100%; width: 0; transition: all 0.4s; border-radius: 2px; }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">
  <div class="card">
    <div class="card-header">
      <div class="logo"></div>
      <h2>Créer un compte</h2>
      <p>Rejoignez la plateforme académique intelligente</p>
    </div>

    <div class="card-body">
      <div id="alertBox" class="alert"></div>

      <div class="role-tabs">
        <button class="role-btn active" id="btnEtudiant" onclick="setRole('etudiant')">
          <i class="fas fa-user-graduate"></i> Étudiant
        </button>
        <button class="role-btn" id="btnProf" onclick="setRole('enseignant')">
          <i class="fas fa-user-tie"></i> Enseignant
        </button>
      </div>

      <!-- Formulaire étudiant -->
      <form id="studentForm" onsubmit="handleRegister(event, false)">
        <div class="row2">
          <div class="field">
            <label>Prénom</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="s_prenom" placeholder="Ahmed" required>
            </div>
          </div>
          <div class="field">
            <label>Nom</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="s_nom" placeholder="Alami" required>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Email Académique</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="s_email" placeholder="ahmed.alami@usms.ac.ma" required>
          </div>
        </div>
        <div class="field">
          <label>Numéro Apogée</label>
          <div class="input-wrap">
            <i class="fas fa-id-card input-icon"></i>
            <input type="text" id="s_apogee" placeholder="Ex: 2200XXXX" required>
          </div>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="s_password" placeholder="••••••••" oninput="checkStrength(this.value)" required>
          </div>
          <div class="password-strength"><div class="strength-bar" id="strengthBar"></div></div>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmitS">
          <i class="fas fa-user-plus"></i> Créer mon compte Étudiant
        </button>
      </form>

      <!-- Formulaire enseignant -->
      <form id="teacherForm" style="display:none" onsubmit="handleRegister(event, true)">
        <div class="row2">
          <div class="field">
            <label>Prénom</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="t_prenom" placeholder="Mohamed" required>
            </div>
          </div>
          <div class="field">
            <label>Nom</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="t_nom" placeholder="Hassan" required>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Email Professionnel</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="t_email" placeholder="prof@usms.ac.ma" required>
          </div>
        </div>
        <div class="field">
          <label>Code Enseignant / Département</label>
          <div class="input-wrap">
            <i class="fas fa-building input-icon"></i>
            <input type="text" id="t_code" placeholder="Ex: PROF-INFO-01" required>
          </div>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="t_password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-submit green" id="btnSubmitT">
          <i class="fas fa-chalkboard-teacher"></i> Créer mon compte Enseignant
        </button>
      </form>

      <div class="login-link">
        Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>
</div>

<script>
  let currentRole = 'etudiant';

  function setRole(role) {
    currentRole = role;
    document.getElementById('studentForm').style.display = role === 'etudiant' ? 'block' : 'none';
    document.getElementById('teacherForm').style.display = role === 'enseignant' ? 'block' : 'none';
    const btnE = document.getElementById('btnEtudiant');
    const btnP = document.getElementById('btnProf');
    btnE.className = role === 'etudiant' ? 'role-btn active' : 'role-btn';
    btnP.className = role === 'enseignant' ? 'role-btn active green' : 'role-btn';
  }

  function checkStrength(pwd) {
    const bar = document.getElementById('strengthBar');
    let score = 0;
    if (pwd.length >= 6) score++;
    if (pwd.length >= 10) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const w = (score / 5) * 100;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
    bar.style.width = w + '%';
    bar.style.background = colors[score - 1] || '#1e293b';
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.innerHTML = msg;
    box.style.display = 'block';
  }

  async function handleRegister(e, isProf) {
    e.preventDefault();
    let apogee, email, password, full_name, btnId;

    if (!isProf) {
      const prenom = document.getElementById('s_prenom').value.trim();
      const nom = document.getElementById('s_nom').value.trim();
      full_name = `${prenom} ${nom}`;
      email = document.getElementById('s_email').value.trim();
      apogee = document.getElementById('s_apogee').value.trim();
      password = document.getElementById('s_password').value;
      btnId = 'btnSubmitS';
    } else {
      const prenom = document.getElementById('t_prenom').value.trim();
      const nom = document.getElementById('t_nom').value.trim();
      full_name = `Pr. ${prenom} ${nom}`;
      email = document.getElementById('t_email').value.trim();
      apogee = document.getElementById('t_code').value.trim();
      password = document.getElementById('t_password').value;
      btnId = 'btnSubmitT';
    }

    const btn = document.getElementById(btnId);
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription...';

    try {
      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apogee, email, password, full_name, is_prof: isProf })
      });
      const data = await res.json();

      if (res.ok) {
        showAlert(' Compte créé avec succès ! Redirection vers la connexion...', 'success');
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        showAlert('' + (data.detail || 'Erreur lors de l\'inscription'), 'error');
        btn.disabled = false;
        btn.innerHTML = isProf ? '<i class="fas fa-chalkboard-teacher"></i> Créer mon compte Enseignant' : '<i class="fas fa-user-plus"></i> Créer mon compte Étudiant';
      }
    } catch (err) {
      showAlert(' Erreur réseau. Le serveur est-il lancé ?', 'error');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
